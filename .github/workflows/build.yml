name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "${{ github.workspace }}/ExampleLib.sln"

      - name: Build
        run: dotnet build "${{ github.workspace }}/ExampleLib.sln" --configuration Release --no-restore

      - name: Pack
        run: dotnet pack "${{ github.workspace }}/ExampleLib.sln" --configuration Release --no-build --output "${{ github.workspace }}/artifacts/packages"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExampleLib-packages
          path: ${{ github.workspace }}/artifacts/packages/*.nupkg
